version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - db-data:/app/data
    depends_on:
      - redis
    networks:
      - trading-net
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: trading-worker
    env_file: .env
    volumes:
      - db-data:/app/data
    depends_on:
      - redis
    networks:
      - trading-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading-frontend
    ports:
      - "3001:80"
    env_file: .env
    depends_on:
      - backend
    networks:
      - trading-net
    restart: unless-stopped

volumes:
  db-data:

networks:
  trading-net:
    driver: bridge
